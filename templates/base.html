<!DOCTYPE html>
<html>
<head>
<title>SmartMess</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; font-family: 'Segoe UI'; }

/* Navbar */
.navbar { background: linear-gradient(45deg,#4e73df,#1cc88a); }

/* Active tab highlight */
.active-nav {
    background: #ffffff;
    color: #000 !important;
    border-radius: 8px;
    padding: 5px 10px;
}

/* Table fix */
table {
    width: 100%;
    table-layout: fixed;
}

th, td {
    word-wrap: break-word;
    white-space: normal;
    text-align: center;
}

/* Buttons inside table */
.table-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

/* Mobile */
@media (max-width: 768px) {

    table {
        font-size: 12px;
    }

    th, td {
        padding: 6px !important;
    }

    .btn {
        width: 100%;
        font-size: 12px;
    }
}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-3">

<a class="navbar-brand fw-bold text-white" href="/">🍽 SmartMess</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link {% if request.path == '/' %}active-nav{% endif %}" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/inventory' in request.path %}active-nav{% endif %}" href="/inventory">Inventory</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/recipe' in request.path or '/dish' in request.path %}active-nav{% endif %}" href="/recipe">Dishes</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/cook' in request.path %}active-nav{% endif %}" href="/cook">Cook</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/chart' in request.path %}active-nav{% endif %}" href="/chart">Analytics</a>
</li>

</ul>

</div>

</nav>

<div class="container mt-3">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
