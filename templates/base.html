<!DOCTYPE html>
<html>
<head>
<title>SmartMess</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; font-family: 'Segoe UI'; }

/* Navbar background */
.navbar {
    background: linear-gradient(45deg,#4e73df,#1cc88a);
}

/* Navbar text visibility */
.navbar .nav-link {
    color: white !important;
    font-weight: 600;
    font-size: 16px;
    padding: 8px 12px;
}

/* Hover effect */
.navbar .nav-link:hover {
    color: #ffd700 !important;
}

/* Active page highlight */
.active-nav {
    background: white;
    color: #4e73df !important;
    border-radius: 10px;
    padding: 6px 12px;
}

/* Navbar brand */
.navbar-brand {
    font-size: 20px;
    font-weight: bold;
}

/* Table scroll */
.table-container {
    width: 100%;
    overflow-x: auto;
}

table {
    min-width: 600px;
}

/* MOBILE FIXES */
@media (max-width: 768px) {

    /* Bigger readable navbar text */
    .navbar .nav-link {
        font-size: 18px;
        padding: 10px;
    }

    /* Better spacing in menu */
    .navbar-nav {
        margin-top: 10px;
    }

    /* Buttons full width */
    .btn {
        width: 100%;
        margin-bottom: 6px;
    }

    /* Headings */
    h3 {
        font-size: 20px;
    }

    /* Table text smaller */
    table {
        font-size: 13px;
    }
}
</style>

</head>

<body>

<!-- 🔥 COLLAPSIBLE NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">

<a class="navbar-brand fw-bold text-white" href="/">🍽 SmartMess</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link {% if request.path=='/' %}active-nav{% endif %}" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/inventory' in request.path %}active-nav{% endif %}" href="/inventory">Inventory</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/recipe' in request.path or '/dish' in request.path %}active-nav{% endif %}" href="/recipe">Dishes</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/cook' in request.path %}active-nav{% endif %}" href="/cook">Cook</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/chart' in request.path %}active-nav{% endif %}" href="/chart">Analytics</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="/logout">Logout</a>
</li>

</ul>

</div>

</nav>

<div class="container mt-3">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
