<!DOCTYPE html>
<html>
<head>
<title>SmartMess</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; font-family: 'Segoe UI'; }

/* Navbar */
.navbar { background: linear-gradient(45deg,#4e73df,#1cc88a); }

/* Cards */
.card { border-radius: 15px; }

/* Table scroll */
.table-container { overflow-x: auto; }

/* Mobile UI */
@media (max-width: 768px) {
    .btn {
        width: 100%;
        margin-bottom: 5px;
    }
}
</style>

</head>

<body>

<nav class="navbar p-2 text-white d-flex justify-content-between flex-wrap">

<span class="fw-bold">🍽 SmartMess</span>

<div class="d-flex flex-wrap gap-1">
<a href="/" class="btn btn-light btn-sm">Home</a>
<a href="/inventory" class="btn btn-light btn-sm">Inventory</a>
<a href="/recipe" class="btn btn-light btn-sm">Dishes</a>
<a href="/cook" class="btn btn-light btn-sm">Cook</a>
<a href="/chart" class="btn btn-light btn-sm">Analytics</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>

</nav>

<div class="container mt-3">
{% block content %}{% endblock %}
</div>

</body>
</html>
