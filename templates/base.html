<!DOCTYPE html>
<html>
<head>
<title>SmartMess</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; font-family: 'Segoe UI'; }
/* Navbar text visibility */
.navbar .nav-link {
    color: white !important;
    font-weight: 500;
}

/* Hover effect */
.navbar .nav-link:hover {
    color: #ffd700 !important;
}

/* Active page highlight */
.active-nav {
    background: rgb(230, 31, 31);
    color: #4e73df !important;
    border-radius: 8px;
    padding: 5px 10px;
}
/* Navbar */
.navbar { background: linear-gradient(45deg,#4e73df,#1cc88a); }

/* Table fix */
.table-container {
    width: 100%;
    overflow-x: auto;
}

table {
    min-width: 600px;  /* prevents squishing */
}

/* Mobile fixes */
@media (max-width: 768px) {
    .btn {
        width: 100%;
        margin-bottom: 5px;
    }

    h3 {
        font-size: 20px;
    }

    table {
        font-size: 12px;
    }
}
</style>

</head>

<body>

<!-- 🔥 COLLAPSIBLE NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">

<a class="navbar-brand fw-bold text-white" href="/">🍽 SmartMess</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link {% if request.path=='/' %}active-nav{% endif %}" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/inventory' in request.path %}active-nav{% endif %}" href="/inventory">Inventory</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/recipe' in request.path or '/dish' in request.path %}active-nav{% endif %}" href="/recipe">Dishes</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/cook' in request.path %}active-nav{% endif %}" href="/cook">Cook</a>
</li>

<li class="nav-item">
<a class="nav-link {% if '/chart' in request.path %}active-nav{% endif %}" href="/chart">Analytics</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="/logout">Logout</a>
</li>

</ul>

</div>

</nav>

<div class="container mt-3">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
