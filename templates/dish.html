{% extends "base.html" %}
{% block content %}

<h3>Dish: {{dish}}</h3>

<div class="card p-3 mb-3">
<form method="POST" class="row g-2">

<input name="ingredient" class="form-control" placeholder="Ingredient" required>
<input name="quantity" class="form-control" placeholder="Quantity" required>

<select name="unit" class="form-control">
<option>kg</option><option>g</option><option>L</option><option>ml</option><option>pieces</option>
</select>

<button class="btn btn-primary">Add</button>

</form>
</div>

<table class="table table-bordered table-sm text-center">

<tr class="table-success">
<th>Ingredient</th>
<th>Qty</th>
<th>Unit</th>
<th>Actions</th>
</tr>

{% for i in items %}
<tr>
<td>{{i[1]}}</td>
<td>{{i[2]}}</td>
<td>{{i[3]}}</td>

<td>
<div class="table-buttons">
<a href="/edit_ingredient/{{i[0]}}/{{dish}}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete_ingredient/{{i[0]}}/{{dish}}" class="btn btn-danger btn-sm">Delete</a>
</div>
</td>

</tr>
{% endfor %}

</table>

{% endblock %}
